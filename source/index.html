<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Game</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <main class="landing-screen">
        <section class="difficulty-section">
            <h2 class="section-title">Select Difficulty</h2>
            <div class="difficulty-stack">
                <button class="difficulty-button">Beginner</button>
                <button class="difficulty-button">Intermediate</button>
                <button class="difficulty-button">Expert</button>
            </div>
        </section>

        <section class="level-section">
            <h2 class="section-title">Select Level</h2>
            <div class="level-stack">
                <button class="level-button">Level 1</button>
                <button class="level-button">Level 2</button>
                <button class="level-button">Level 3</button>
                <button class="level-button">Level 4</button>
                <button class="level-button">Level 5</button>
                <button class="level-button">Level 6</button>
            </div>
            <div class="start-section">
                <a href="game.html" class="start-button">Start</a>
            </div>
        </section>
    </main>
</body>
</html>
