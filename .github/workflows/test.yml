name: PR Quality Check

on:
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ESLint
        run: npx --yes eslint@9 --no-error-on-unmatched-pattern "source/**/*.js"

  unit-test:
    name: Unit Tests (Jasmine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Jasmine specs
        run: |
          shopt -s nullglob globstar
          files=(source/tests/**/*.test.js)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::notice::No unit tests found yet, skipping."
            exit 0
          fi
          npx --yes jasmine "${files[@]}"

  validate:
    name: HTML/CSS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate HTML
        run: |
          shopt -s nullglob globstar
          files=(source/**/*.html)
          nonempty=()
          for f in "${files[@]}"; do
            [ -s "$f" ] && nonempty+=("$f")
          done
          if [ ${#nonempty[@]} -eq 0 ]; then
            echo "::notice::No HTML files to validate yet, skipping."
            exit 0
          fi
          npx --yes html-validate@9 "${nonempty[@]}"

      - name: Validate CSS
        run: |
          shopt -s nullglob globstar
          files=(source/**/*.css)
          nonempty=()
          for f in "${files[@]}"; do
            [ -s "$f" ] && nonempty+=("$f")
          done
          if [ ${#nonempty[@]} -eq 0 ]; then
            echo "::notice::No CSS files to validate yet, skipping."
            exit 0
          fi
          # stylelint resolves `extends` from the config file's location, which
          # has no node_modules. Point it at the npx cache where the config lives.
          npx --yes -p stylelint@16 -p stylelint-config-standard@36 -- bash -c '
            basedir=$(dirname "$(dirname "$(command -v stylelint)")")
            stylelint --config-basedir "$basedir" "$@"
          ' -- "${nonempty[@]}"
